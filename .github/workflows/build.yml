name: Build ARM64

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-daemon:
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:22.04
      options: --platform linux/arm64
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install build deps
      run: |
        apt-get update
        apt-get install -y gcc g++ cmake pkg-config make file \
          libjson-c-dev libglib2.0-dev libdbus-1-dev libsystemd-dev

    - name: Build daemon + CLI + wizard
      run: |
        mkdir build
        cd build
        cmake .. -DBUILD_GUI=OFF -DBUILD_TESTS=OFF
        make -j$(nproc)

    - name: Verify binaries
      run: |
        file build/uperf-linux
        file build/uperfctl
        file build/uperf-wizard
        ls -lh build/uperf-linux build/uperfctl build/uperf-wizard

    - name: Upload daemon artifacts
      uses: actions/upload-artifact@v4
      with:
        name: uperf-linux-arm64
        path: |
          build/uperf-linux
          build/uperfctl
          build/uperf-wizard
        retention-days: 7

  build-gui:
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:22.04
      options: --platform linux/arm64
    needs: build-daemon
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt6 build deps
      run: |
        apt-get update
        apt-get install -y gcc g++ cmake pkg-config make file \
          libjson-c-dev libglib2.0-dev libdbus-1-dev libsystemd-dev \
          qt6-base-dev qt6-charts-dev qt6-qml-dev qtbase6-dev-tools

    - name: Build GUI
      run: |
        mkdir build
        cd build
        cmake .. -DBUILD_TESTS=OFF
        make -j$(nproc)

    - name: Verify GUI binary
      run: |
        file build/gui/uperf-gui
        ls -lh build/gui/uperf-gui

    - name: Upload GUI artifact
      uses: actions/upload-artifact@v4
      with:
        name: uperf-gui-arm64
        path: build/gui/uperf-gui
        retention-days: 7
