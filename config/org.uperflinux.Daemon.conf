<?xml version="1.0"?>
<!DOCTYPE busconfig PUBLIC
  "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- The system service runs as root and is the only process allowed to own
       the well-known name. Normal desktop users may call the exported API. -->
  <policy user="root">
    <allow own="org.uperflinux.Daemon"/>
  </policy>
  <policy context="default">
    <allow send_destination="org.uperflinux.Daemon"/>
    <allow receive_sender="org.uperflinux.Daemon"/>
  </policy>
</busconfig>
